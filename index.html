<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SAMOO</title>
<!-- إضافة مكتبة Font Awesome للأيقونات -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    body{ font-family:Arial; margin:0; background:#f2f2f2; direction:rtl; }
    header{ background:#1a237e; color:white; padding:15px; text-align:center; font-weight:bold; }
    nav{ display:flex; justify-content:space-around; background:#333; }
    nav button{ flex:1; padding:15px; border:none; background:#333; color:white; font-size:16px; cursor:pointer; }
    section{ display:none; padding:15px; }
    .active{ display:block; }
    input,select,textarea{ width:100%; padding:10px; margin:5px 0; border:1px solid #ccc; border-radius:5px; box-sizing: border-box; }
    button{ padding:10px; margin-top:5px; border:none; border-radius:5px; cursor:pointer; }
    .addBtn{ background:#007bff; color:white; width:100%; }
    .statusBtn{ background:#ddd; margin: 2px; }
    .green{ background:#28a745 !important; color:white; }
    .card{ background:white; padding:10px; margin-top:10px; border-radius:6px; box-shadow:0 2px 5px rgba(0,0,0,0.2); border-right: 5px solid #1a237e; position: relative; }
    .archiveToggle{ background:#444; color:white; width:100%; margin-top:10px; }
    .archive{ display:none; }
    .loading { text-align: center; color: #666; padding: 20px; }
    
    /* تنسيق أزرار التعديل والحذف */
    .card-actions {
        position: absolute;
        top: 10px;
        left: 10px;
        display: flex;
        gap: 5px;
    }
    
    .edit-btn, .delete-btn {
        background: none;
        border: none;
        cursor: pointer;
        padding: 5px;
        border-radius: 4px;
        transition: all 0.3s;
        font-size: 16px;
    }
    
    .edit-btn i {
        color: #4CAF50;
    }
    
    .delete-btn i {
        color: #f44336;
    }
    
    .edit-btn:hover {
        background-color: rgba(76, 175, 80, 0.2);
        transform: scale(1.1);
    }
    
    .delete-btn:hover {
        background-color: rgba(244, 67, 54, 0.2);
        transform: scale(1.1);
    }
    
    /* تنسيق محتوى البطاقة */
    .card-content {
        margin-left: 60px;
    }
</style>
</head>
<body>

<header>SAMOO</header>

<nav>
    <button onclick="show('infractions')">المخالفات</button>
    <button onclick="show('pieces')">القطع</button>
    <button onclick="show('info')">حساب الإجازة</button>
</nav>

<section id="infractions" class="active">
    <h3>إضافة مخالفة</h3>
    <input id="nom" placeholder="اسم المخالف">
    <input id="pv" placeholder="رقم المحضر">
    <input id="date" type="date">
    <button class="addBtn" onclick="addInfraction()">إضافة</button>
    <div id="infList"><div class="loading">جاري مزامنة البيانات السحابية...</div></div>
    <button class="archiveToggle" onclick="toggleArchive('infArchive')">عرض الأرشيف</button>
    <div id="infArchive" class="archive"></div>
</section>

<section id="pieces">
    <h3>إضافة قطعة</h3>
    <input id="typePiece" placeholder="نوع القطعة">
    <input id="namePiece" placeholder="اسم القطعة">
    <textarea id="notesPiece" placeholder="ملاحظات"></textarea>
    <input id="dateRec" type="date">
    <button class="addBtn" onclick="addPiece()">إضافة قطعة</button>
    <div id="pieceList"></div>
    <button class="archiveToggle" onclick="toggleArchive('pieceArchive')">عرض الأرشيف</button>
    <div id="pieceArchive" class="archive"></div>
</section>

<section id="info">
    <h3>حساب الإجازة</h3>
    <select id="leaveType">
        <option value="75">إجازة 75 يوم</option>
        <option value="90">إجازة 90 يوم</option>
        <option value="45">إجازة 45 يوم</option>
    </select>
    <input type="date" id="startDate">
    <button class="addBtn" onclick="calc()">احسب</button>
    <h2 id="result" style="text-align:center;"></h2>
</section>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBbj9zJK7QXwetU4wfM4DbZkurFSy_9v08",
        authDomain: "samoo-app.firebaseapp.com",
        projectId: "samoo-app",
        storageBucket: "samoo-app.firebasestorage.app",
        messagingSenderId: "474368360223",
        appId: "1:474368360223:web:eb28dace95f8e42e02ba2a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // الدوال الأساسية للواجهة
    window.show = (id) => {
        document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
        document.getElementById(id).classList.add("active");
    };

    window.toggleArchive = (id) => {
        let el = document.getElementById(id);
        el.style.display = el.style.display === "block" ? "none" : "block";
    };

    // --- إدارة المخالفات ---
    window.addInfraction = async () => {
        let nom = document.getElementById("nom").value;
        let pv = document.getElementById("pv").value;
        let date = document.getElementById("date").value;
        if(nom && pv) {
            await addDoc(collection(db, "infractions"), { nom, pv, date, pay: false, h1: false, h2: false, archived: false });
            document.getElementById("nom").value = ""; document.getElementById("pv").value = "";
        }
    };

    window.toggleInfStatus = async (id, field, val) => {
        const ref = doc(db, "infractions", id);
        let update = { [field]: !val };
        await updateDoc(ref, update);
    };

    // دالة تعديل المخالفة
    window.editInfraction = async (id, currentNom, currentPv, currentDate) => {
        const newNom = prompt('تعديل اسم المخالف:', currentNom);
        if (newNom === null) return;
        
        const newPv = prompt('تعديل رقم المحضر:', currentPv);
        if (newPv === null) return;
        
        const newDate = prompt('تعديل التاريخ (YYYY-MM-DD):', currentDate);
        if (newDate === null) return;
        
        if (newNom.trim() !== '' && newPv.trim() !== '' && newDate.trim() !== '') {
            const ref = doc(db, "infractions", id);
            await updateDoc(ref, { 
                nom: newNom,
                pv: newPv,
                date: newDate
            });
        }
    };

    // دالة حذف المخالفة
    window.deleteInfraction = async (id) => {
        if (confirm('هل أنت متأكد من حذف هذه المخالفة؟')) {
            const ref = doc(db, "infractions", id);
            await deleteDoc(ref);
        }
    };

    onSnapshot(collection(db, "infractions"), (snapshot) => {
        let list = document.getElementById("infList");
        let arch = document.getElementById("infArchive");
        list.innerHTML = ""; arch.innerHTML = "";
        snapshot.forEach(docSnap => {
            let i = docSnap.data();
            let id = docSnap.id;
            
            // التحقق من الأرشفة التلقائية (إذا اكتملت الشروط الثلاثة)
            if (i.pay && i.h1 && i.h2 && !i.archived) {
                updateDoc(doc(db, "infractions", id), { archived: true });
            }

            let card = `<div class="card">
                <div class="card-actions">
                    <button class="edit-btn" onclick="editInfraction('${id}', '${i.nom}', '${i.pv}', '${i.date}')">
                        <i class="fas fa-pen"></i>
                    </button>
                    <button class="delete-btn" onclick="deleteInfraction('${id}')">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
                <div class="card-content">
                    <b>${i.nom}</b><br>PV: ${i.pv}<br>${i.date}<br><br>
                    ${!i.archived ? `
                    <button class="statusBtn ${i.pay?'green':''}" onclick="toggleInfStatus('${id}','pay',${i.pay})">دفع</button>
                    <button class="statusBtn ${i.h1?'green':''}" onclick="toggleInfStatus('${id}','h1',${i.h1})">حجز1</button>
                    <button class="statusBtn ${i.h2?'green':''}" onclick="toggleInfStatus('${id}','h2',${i.h2})">حجز2</button>
                    ` : '<span style="color:green">✓ مؤرشف ومكتمل</span>'}
                </div>
            </div>`;
            i.archived ? arch.innerHTML += card : list.innerHTML += card;
        });
    });

    // --- إدارة القطع الإدارية ---
    window.addPiece = async () => {
        let type = document.getElementById("typePiece").value;
        let name = document.getElementById("namePiece").value;
        let notes = document.getElementById("notesPiece").value;
        let rec = document.getElementById("dateRec").value;
        if(type) {
            await addDoc(collection(db, "pieces"), { type, name, notes, rec, archived: false });
            document.getElementById("typePiece").value = ""; document.getElementById("namePiece").value = "";
        }
    };

    window.deliverPiece = async (id) => {
        await updateDoc(doc(db, "pieces", id), { archived: true, deliverDate: new Date().toLocaleDateString() });
    };

    // دالة تعديل القطعة
    window.editPiece = async (id, currentType, currentName, currentNotes, currentRec) => {
        const newType = prompt('تعديل نوع القطعة:', currentType);
        if (newType === null) return;
        
        const newName = prompt('تعديل اسم القطعة:', currentName);
        if (newName === null) return;
        
        const newNotes = prompt('تعديل الملاحظات:', currentNotes);
        if (newNotes === null) return;
        
        const newRec = prompt('تعديل تاريخ الاستلام (YYYY-MM-DD):', currentRec);
        if (newRec === null) return;
        
        if (newType.trim() !== '') {
            const ref = doc(db, "pieces", id);
            await updateDoc(ref, { 
                type: newType,
                name: newName,
                notes: newNotes,
                rec: newRec
            });
        }
    };

    // دالة حذف القطعة
    window.deletePiece = async (id) => {
        if (confirm('هل أنت متأكد من حذف هذه القطعة؟')) {
            const ref = doc(db, "pieces", id);
            await deleteDoc(ref);
        }
    };

    onSnapshot(collection(db, "pieces"), (snapshot) => {
        let list = document.getElementById("pieceList");
        let arch = document.getElementById("pieceArchive");
        list.innerHTML = ""; arch.innerHTML = "";
        snapshot.forEach(docSnap => {
            let p = docSnap.data();
            let id = docSnap.id;
            let card = `<div class="card">
                <div class="card-actions">
                    <button class="edit-btn" onclick="editPiece('${id}', '${p.type}', '${p.name}', '${p.notes}', '${p.rec}')">
                        <i class="fas fa-pen"></i>
                    </button>
                    <button class="delete-btn" onclick="deletePiece('${id}')">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
                <div class="card-content">
                    <b>${p.type}</b><br>${p.name}<br><small>${p.notes}</small><br>استلام: ${p.rec}
                    ${!p.archived ? `<br><button class="addBtn" onclick="deliverPiece('${id}')">تم التسليم</button>` : `<br><small>تم التسليم في: ${p.deliverDate}</small>`}
                </div>
            </div>`;
            p.archived ? arch.innerHTML += card : list.innerHTML += card;
        });
    });

    // --- حساب الإجازات ---
    window.calc = () => {
        let days = parseInt(document.getElementById("leaveType").value);
        let start = new Date(document.getElementById("startDate").value);
        if(!isNaN(start.getTime())){
            start.setDate(start.getDate() + days);
            document.getElementById("result").innerText = "الإجازة القادمة: " + start.toLocaleDateString('ar-EG');
        }
    };
</script>
</body>
</html>
